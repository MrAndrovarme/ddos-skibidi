<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoTierss</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
	background: #0e0e10;
	color: #e8e8f0;
	font-family: 'Outfit', sans-serif;
	min-height: 100vh;
	-webkit-font-smoothing: antialiased;
	overflow-x: hidden;
}

::selection { background: #5b6cf9; color: #fff; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #0e0e10; }
::-webkit-scrollbar-thumb { background: #1e1e24; border-radius: 99px; }

header {
	height: 62px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 0 24px;
	border-bottom: 1px solid rgba(255,255,255,0.07);
	position: sticky;
	top: 0;
	background: #0e0e10;
	z-index: 99;
	animation: hdrIn .4s cubic-bezier(.16,1,.3,1) both;
}

@keyframes hdrIn {
	from { transform: translateY(-100%); opacity: 0; }
	to { transform: translateY(0); opacity: 1; }
}

.logo {
	display: flex;
	align-items: center;
	gap: 10px;
}

.logo-box {
	width: 30px;
	height: 30px;
	background: linear-gradient(135deg, #5b6cf9, #8b5cf6);
	border-radius: 7px;
	display: flex;
	align-items: center;
	justify-content: center;
	font-weight: 900;
	font-size: .85rem;
	color: #fff;
	animation: glowpulse 3s ease-in-out infinite;
	flex-shrink: 0;
}

@keyframes glowpulse {
	0%, 100% { box-shadow: 0 0 18px rgba(91,108,249,.4); }
	50% { box-shadow: 0 0 32px rgba(91,108,249,.75); }
}

.logo-name {
	font-weight: 800;
	font-size: 1.2rem;
	letter-spacing: -.02em;
	line-height: 1;
}
.logo-name span { color: #5b6cf9; }

.logo-sub {
	font-family: 'JetBrains Mono', monospace;
	font-size: .58rem;
	color: #3a3a50;
	letter-spacing: .05em;
	display: block;
	margin-top: 3px;
}

.hdr-right {
	display: flex;
	align-items: center;
	gap: 8px;
}

.search-wrap { position: relative; }

#searchInput {
	width: 210px;
	background: #141416;
	border: 1px solid rgba(255,255,255,0.07);
	border-radius: 6px;
	color: #e8e8f0;
	font-family: 'Outfit', sans-serif;
	font-size: .84rem;
	font-weight: 500;
	padding: 8px 13px;
	outline: none;
	transition: border-color .2s, box-shadow .2s, width .25s;
}

#searchInput::placeholder { color: #333344; }

#searchInput:focus {
	border-color: #5b6cf9;
	box-shadow: 0 0 0 3px rgba(91,108,249,.14);
	width: 250px;
}

#suggs {
	position: absolute;
	top: calc(100% + 7px);
	left: 0;
	width: 100%;
	background: #131316;
	border: 1px solid rgba(255,255,255,0.1);
	border-radius: 9px;
	overflow: hidden;
	display: none;
	z-index: 200;
	box-shadow: 0 14px 38px rgba(0,0,0,.55);
}

#suggs.show {
	display: block;
	animation: suggDrop .14s ease both;
}

@keyframes suggDrop {
	from { opacity: 0; transform: translateY(-5px); }
	to { opacity: 1; transform: translateY(0); }
}

.sugg {
	display: flex;
	align-items: center;
	gap: 9px;
	padding: 8px 13px;
	cursor: pointer;
	transition: background .1s;
}
.sugg:hover, .sugg.on { background: #1a1a1f; }
.sugg img { width: 28px; height: 28px; image-rendering: pixelated; border-radius: 4px; }
.sugg-name { flex: 1; font-weight: 600; font-size: .86rem; }
.sugg-pts { font-family: 'JetBrains Mono', monospace; font-size: .65rem; color: #555570; }

.btn-search {
	background: linear-gradient(135deg, #5b6cf9, #8b5cf6);
	border: none;
	border-radius: 6px;
	color: #fff;
	font-family: 'Outfit', sans-serif;
	font-weight: 700;
	font-size: .84rem;
	padding: 8px 17px;
	cursor: pointer;
	transition: opacity .2s, transform .1s;
}
.btn-search:hover { opacity: .88; }
.btn-search:active { transform: scale(.97); }

#plcount {
	font-family: 'JetBrains Mono', monospace;
	font-size: .68rem;
	color: #333344;
	background: #141416;
	border: 1px solid rgba(255,255,255,.06);
	border-radius: 99px;
	padding: 4px 11px;
}

nav {
	background: #111114;
	border-bottom: 1px solid rgba(255,255,255,0.07);
	display: flex;
	overflow-x: auto;
	scrollbar-width: none;
	padding: 0 18px;
	gap: 1px;
	animation: hdrIn .4s .06s cubic-bezier(.16,1,.3,1) both;
}
nav::-webkit-scrollbar { display: none; }

.tab {
	display: flex;
	align-items: center;
	gap: 6px;
	padding: 12px 15px;
	font-family: 'Outfit', sans-serif;
	font-weight: 600;
	font-size: .8rem;
	color: #555570;
	background: none;
	border: none;
	border-bottom: 2px solid transparent;
	cursor: pointer;
	white-space: nowrap;
	transition: color .18s, border-color .18s;
	position: relative;
	top: 1px;
	letter-spacing: .01em;
}
.tab:hover { color: #e8e8f0; }
.tab.active { color: #fff; border-bottom-color: #5b6cf9; }
.tab img { width: 14px; height: 14px; opacity: .45; transition: opacity .18s; }
.tab:hover img, .tab.active img { opacity: 1; }

#board {
	padding: 22px;
	display: flex;
	gap: 13px;
	overflow-x: auto;
	min-height: calc(100vh - 118px);
	animation: boardSlide .42s .09s cubic-bezier(.16,1,.3,1) both;
}

@keyframes boardSlide {
	from { opacity: 0; transform: translateY(18px); }
	to { opacity: 1; transform: translateY(0); }
}

.col {
	flex: 1;
	min-width: 255px;
	background: #111114;
	border: 1px solid rgba(255,255,255,0.07);
	border-radius: 9px;
	overflow: hidden;
	display: flex;
	flex-direction: column;
}

.col-hd {
	padding: 14px 17px 11px;
	border-bottom: 1px solid rgba(255,255,255,0.07);
	display: flex;
	align-items: center;
	justify-content: space-between;
}

.col-title {
	font-weight: 800;
	font-size: .9rem;
	letter-spacing: .04em;
	text-transform: uppercase;
}

.col-ct {
	font-family: 'JetBrains Mono', monospace;
	font-size: .62rem;
	color: #333344;
	background: #0e0e10;
	border: 1px solid rgba(255,255,255,.05);
	border-radius: 99px;
	padding: 2px 8px;
}

.col-body { flex: 1; overflow-y: auto; }

.pc {
	display: flex;
	align-items: center;
	gap: 10px;
	padding: 10px 15px;
	border-bottom: 1px solid rgba(255,255,255,0.05);
	cursor: pointer;
	transition: background .13s;
	animation: cardslide .28s ease both;
}

@keyframes cardslide {
	from { opacity: 0; transform: translateX(-7px); }
	to { opacity: 1; transform: translateX(0); }
}

.pc:last-child { border-bottom: none; }
.pc:hover { background: #18181d; }
.pc:hover .pc-arr { opacity: 1; transform: translateX(0); }
.pc:hover .pc-img { transform: scale(1.07); }

.pc-num {
	font-family: 'JetBrains Mono', monospace;
	font-size: .62rem;
	color: #333344;
	min-width: 20px;
	text-align: right;
}

.pc-img {
	width: 35px;
	height: 35px;
	image-rendering: pixelated;
	border-radius: 5px;
	background: #1a1a1f;
	flex-shrink: 0;
	transition: transform .18s;
}

.pc-info { flex: 1; min-width: 0; }

.pc-name {
	font-weight: 700;
	font-size: .92rem;
	letter-spacing: -.01em;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}

.pc-sub {
	font-family: 'JetBrains Mono', monospace;
	font-size: .58rem;
	color: #333344;
	margin-top: 2px;
	letter-spacing: .04em;
}

.pc-r {
	display: flex;
	align-items: center;
	gap: 7px;
	flex-shrink: 0;
}

.pc-tier {
	font-family: 'JetBrains Mono', monospace;
	font-weight: 700;
	font-size: .8rem;
	letter-spacing: .05em;
}

.pc-arr {
	font-size: .68rem;
	color: #333344;
	opacity: 0;
	transform: translateX(-4px);
	transition: opacity .17s, transform .17s;
}

.reg-tag {
	font-family: 'JetBrains Mono', monospace;
	font-size: .52rem;
	color: #333344;
	border: 1px solid rgba(255,255,255,.06);
	border-radius: 4px;
	padding: 1px 5px;
}

.empty-col {
	padding: 44px 20px;
	text-align: center;
	font-family: 'JetBrains Mono', monospace;
	font-size: .68rem;
	color: #252530;
	letter-spacing: .1em;
}

.ov-wrap { width: 100%; }

.ov-table-box {
	background: #111114;
	border: 1px solid rgba(255,255,255,.07);
	border-radius: 9px;
	overflow: hidden;
	width: 100%;
}

.ov-table-box table { width: 100%; border-collapse: collapse; }

.ov-table-box thead tr { border-bottom: 1px solid rgba(255,255,255,.07); }

.ov-table-box thead th {
	font-family: 'JetBrains Mono', monospace;
	font-size: .6rem;
	font-weight: 500;
	color: #333344;
	letter-spacing: .1em;
	text-transform: uppercase;
	padding: 11px 15px;
	text-align: left;
}

.ov-table-box tbody tr {
	border-bottom: 1px solid rgba(255,255,255,.04);
	cursor: pointer;
	transition: background .13s;
}
.ov-table-box tbody tr:last-child { border-bottom: none; }
.ov-table-box tbody tr:hover { background: #18181d; }
.ov-table-box tbody td { padding: 9px 15px; vertical-align: middle; }

.rank-cell {
	font-family: 'JetBrains Mono', monospace;
	font-size: .7rem;
	font-weight: 700;
	color: #333344;
	width: 40px;
}
.rank-cell.g { color: #f59e0b; }
.rank-cell.s { color: #94a3b8; }
.rank-cell.b { color: #b45309; }

.pl-cell { display: flex; align-items: center; gap: 9px; }
.pl-cell img { width: 30px; height: 30px; image-rendering: pixelated; border-radius: 4px; background: #1a1a1f; }
.pl-name { font-weight: 700; font-size: .9rem; letter-spacing: -.01em; }

.pts-cell {
	font-family: 'JetBrains Mono', monospace;
	font-size: .76rem;
	font-weight: 700;
	color: #5b6cf9;
}

.mini-pill {
	font-family: 'JetBrains Mono', monospace;
	font-size: .58rem;
	font-weight: 700;
	padding: 2px 6px;
	border-radius: 4px;
	background: rgba(255,255,255,.03);
	border: 1px solid rgba(255,255,255,.05);
	letter-spacing: .04em;
}

#modal {
	position: fixed;
	inset: 0;
	background: rgba(0,0,0,.72);
	backdrop-filter: blur(5px);
	z-index: 500;
	display: flex;
	align-items: center;
	justify-content: center;
	opacity: 0;
	pointer-events: none;
	transition: opacity .2s;
}
#modal.open { opacity: 1; pointer-events: auto; }

.mbox {
	background: #131316;
	border: 1px solid rgba(255,255,255,.11);
	border-radius: 14px;
	width: 100%;
	max-width: 450px;
	margin: 20px;
	position: relative;
	box-shadow: 0 28px 70px rgba(0,0,0,.65);
}
#modal.open .mbox { animation: mboxpop .28s cubic-bezier(.34,1.56,.64,1) both; }

@keyframes mboxpop {
	from { opacity: 0; transform: scale(.93) translateY(14px); }
	to { opacity: 1; transform: scale(1) translateY(0); }
}

.mbox-top {
	display: flex;
	gap: 16px;
	align-items: center;
	padding: 20px 20px 16px;
	border-bottom: 1px solid rgba(255,255,255,.07);
}

.m-avatar {
	width: 66px;
	height: 66px;
	image-rendering: pixelated;
	border-radius: 9px;
	background: #1a1a1f;
	flex-shrink: 0;
	object-fit: cover;
	border: 1px solid rgba(255,255,255,.1);
}

.m-name {
	font-weight: 800;
	font-size: 1.45rem;
	letter-spacing: -.02em;
	line-height: 1.1;
}

.m-meta {
	display: flex;
	align-items: center;
	gap: 7px;
	margin-top: 6px;
	flex-wrap: wrap;
}

.m-reg {
	font-family: 'JetBrains Mono', monospace;
	font-size: .6rem;
	color: #444458;
	border: 1px solid rgba(255,255,255,.07);
	border-radius: 4px;
	padding: 2px 6px;
}

.m-rank {
	font-family: 'JetBrains Mono', monospace;
	font-size: .65rem;
	font-weight: 700;
	color: #5b6cf9;
	background: rgba(91,108,249,.1);
	border: 1px solid rgba(91,108,249,.22);
	border-radius: 4px;
	padding: 2px 7px;
}

.m-pts {
	font-family: 'JetBrains Mono', monospace;
	font-size: .65rem;
	color: #555570;
}

.m-close {
	position: absolute;
	top: 13px;
	right: 13px;
	background: #1a1a1f;
	border: 1px solid rgba(255,255,255,.07);
	color: #555570;
	width: 27px;
	height: 27px;
	border-radius: 6px;
	cursor: pointer;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: .82rem;
	transition: background .14s, color .14s;
}
.m-close:hover { background: rgba(255,60,60,.14); color: #ff4040; }

.m-kits {
	display: grid;
	grid-template-columns: repeat(4, 1fr);
	gap: 7px;
	padding: 16px 20px 20px;
}

.m-kit {
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: 5px;
	background: #1a1a1f;
	border: 1px solid rgba(255,255,255,.06);
	border-radius: 9px;
	padding: 11px 5px 9px;
	transition: border-color .18s, transform .18s;
}
.m-kit:hover { transform: translateY(-2px); }
.m-kit img { width: 20px; height: 20px; opacity: .7; }
.m-kit-name {
	font-family: 'JetBrains Mono', monospace;
	font-size: .5rem;
	color: #333344;
	letter-spacing: .06em;
	text-transform: uppercase;
	text-align: center;
}
.m-kit-tier {
	font-family: 'JetBrains Mono', monospace;
	font-weight: 700;
	font-size: .85rem;
	letter-spacing: .05em;
}

.info-pg {
	display: flex;
	flex-direction: column;
	padding: 38px 26px;
	gap: 28px;
	width: 100%;
}

.pg-eyebrow {
	font-family: 'JetBrains Mono', monospace;
	font-size: .62rem;
	color: #333344;
	letter-spacing: .18em;
	text-transform: uppercase;
	margin-bottom: 9px;
}

.pg-heading {
	font-size: clamp(2.2rem, 5.5vw, 4rem);
	font-weight: 900;
	letter-spacing: -.03em;
	line-height: .95;
}

.disc-btn {
	display: inline-flex;
	align-items: center;
	gap: 11px;
	background: #5865f2;
	color: #fff;
	font-family: 'Outfit', sans-serif;
	font-weight: 700;
	font-size: .92rem;
	padding: 12px 22px;
	border-radius: 9px;
	text-decoration: none;
	transition: opacity .18s, transform .1s;
	width: fit-content;
}
.disc-btn:hover { opacity: .86; transform: translateY(-1px); }
.disc-btn svg { width: 19px; height: 19px; }

.staff-list { display: flex; flex-wrap: wrap; gap: 11px; }

.staff-card {
	background: #1a1a1f;
	border: 1px solid rgba(255,255,255,.07);
	border-radius: 9px;
	padding: 16px 22px;
	transition: border-color .18s, transform .18s;
}
.staff-card:hover { border-color: rgba(255,255,255,.14); transform: translateY(-2px); }

.staff-role {
	font-family: 'JetBrains Mono', monospace;
	font-size: .58rem;
	color: #5b6cf9;
	letter-spacing: .14em;
	text-transform: uppercase;
	font-weight: 700;
	margin-bottom: 5px;
}

.staff-name { font-weight: 800; font-size: 1.15rem; letter-spacing: -.01em; }

.ht1 { color: #e040fb; }
.ht2 { color: #40c4ff; }
.ht3 { color: #ffee40; }
.ht4 { color: #e0e0e0; }
.ht5 { color: #aaaaaa; }
.lt1 { color: #40c4ff; }
.lt2 { color: #ffee40; }
.lt3 { color: #c0c0c0; }
.lt4 { color: #909090; }
.lt5 { color: #666680; }
.ur  { color: #333344; }

.loader {
	display: flex;
	align-items: center;
	justify-content: center;
	width: 100%;
	gap: 9px;
	font-family: 'JetBrains Mono', monospace;
	font-size: .72rem;
	color: #333344;
}

.spinner {
	width: 15px;
	height: 15px;
	border: 2px solid rgba(255,255,255,.08);
	border-top-color: #5b6cf9;
	border-radius: 50%;
	animation: spin .7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 620px) {
	header { flex-wrap: wrap; height: auto; padding: 11px 15px; gap: 9px; }
	#plcount { display: none; }
	.m-kits { grid-template-columns: repeat(3, 1fr); }
	#board { padding: 13px; }
}

</style>
</head>
<body>

<header>
	<div class="logo">
		<div class="logo-box">G</div>
		<div>
			<div class="logo-name">Geo<span>Tierss</span></div>
			<span class="logo-sub">by androvame</span>
		</div>
	</div>
	<div class="hdr-right">
		<div class="search-wrap">
			<input id="searchInput" type="text" placeholder="Search player..." autocomplete="off">
			<div id="suggs"></div>
		</div>
		<button class="btn-search" onclick="doSearch()">Search</button>
		<div id="plcount">— players</div>
	</div>
</header>

<nav id="tabs"></nav>

<div id="board">
	<div class="loader"><div class="spinner"></div> loading...</div>
</div>

<div id="modal">
	<div class="mbox">
		<button class="m-close" onclick="closeModal()">&#x2715;</button>
		<div id="mContent"></div>
	</div>
</div>

<script>

var kits = ["Sword","Vanilla","UHC","Pot","NetherOP","SMP","Axe","Mace"];
var modes = ["Overall","Sword","Vanilla","UHC","Pot","NetherOP","SMP","Axe","Mace","Community","Staff"];

var icons = {
	Overall:  "https://mctiers.com/tier_icons/overall.svg",
	Sword:    "https://mctiers.com/tier_icons/sword.svg",
	Vanilla:  "https://mctiers.com/tier_icons/vanilla.svg",
	UHC:      "https://mctiers.com/tier_icons/uhc.svg",
	Pot:      "https://mctiers.com/tier_icons/pot.svg",
	NetherOP: "https://mctiers.com/tier_icons/nethop.svg",
	SMP:      "https://mctiers.com/tier_icons/smp.svg",
	Axe:      "https://mctiers.com/tier_icons/axe.svg",
	Mace:     "https://mctiers.com/tier_icons/mace.svg"
};

var tierPts = { HT1:25, HT2:15, HT3:10, HT4:6, HT5:2, LT1:20, LT2:12, LT3:8, LT4:4, LT5:1, UR:0 };

var kitShort = { NetherOP:"NOP", Vanilla:"Van", Sword:"Swd", Mace:"Mace", Axe:"Axe", Pot:"Pot", UHC:"UHC", SMP:"SMP" };

var players = [];
var curMode = "Overall";
var sugFocus = -1;

function calcPts(p) {
	var total = 0;
	for (var i = 0; i < kits.length; i++) {
		var t = (p.tiers || {})[kits[i]] || "UR";
		total += tierPts[t] || 0;
	}
	return total;
}

function tierClass(t) {
	if (!t || t == "UR") return "ur";
	return t.toLowerCase();
}

function getHeadUrl(p) {
	if (p.skinUrl) return p.skinUrl;
	return "https://tabavatars.net/avatar/?username=" + encodeURIComponent(p.name) + "&type=helm&size=36";
}

function getBodyUrl(p) {
	if (p.skinUrl) return p.skinUrl;
	return "https://tabavatars.net/avatar/?username=" + encodeURIComponent(p.name) + "&type=helm&size=36";
}

function globalRank(name) {
	var sorted = players.slice().sort(function(a,b){ return b.prestige - a.prestige; });
	for (var i = 0; i < sorted.length; i++) {
		if (sorted[i].name == name) return i + 1;
	}
	return "-";
}

function loadData() {
	fetch("./players.json?t=" + Date.now())
		.then(function(res) { return res.json(); })
		.then(function(raw) {
			players = raw.map(function(p) {
				p.prestige = calcPts(p);
				return p;
			});
			document.getElementById("plcount").textContent = players.length + " players";
			buildTabs();
			renderBoard();
		})
		.catch(function(e) {
			document.getElementById("board").innerHTML = '<div class="loader" style="color:#ff4444">Couldnt load players.json</div>';
		});
}

function buildTabs() {
	var html = "";
	for (var i = 0; i < modes.length; i++) {
		var m = modes[i];
		var active = m == curMode ? " active" : "";
		var ico = "";
		if (icons[m]) {
			ico = '<img src="' + icons[m] + '" alt="">';
		} else if (m == "Community") {
			ico = "&#x1F465;";
		} else {
			ico = "&#x1F451;";
		}
		html += '<button class="tab' + active + '" onclick="switchMode(\'' + m + '\')">' + ico + m + '</button>';
	}
	document.getElementById("tabs").innerHTML = html;
}

function switchMode(m) {
	curMode = m;
	buildTabs();
	var b = document.getElementById("board");
	b.style.animation = "none";
	b.offsetHeight;
	b.style.animation = "boardSlide .35s cubic-bezier(.16,1,.3,1) both";
	renderBoard();
}

function renderBoard() {
	var b = document.getElementById("board");
	if (curMode == "Community") { renderCommunity(b); return; }
	if (curMode == "Staff")     { renderStaff(b);     return; }
	if (curMode == "Overall")   { renderOverall(b);   return; }
	renderKitMode(b, curMode);
}

function renderOverall(b) {
	var sorted = players.slice().sort(function(a,x){ return x.prestige - a.prestige; });

	var thKits = "";
	for (var i = 0; i < kits.length; i++) {
		thKits += '<th><img src="' + icons[kits[i]] + '" style="width:13px;height:13px;vertical-align:middle;opacity:.55" title="' + kits[i] + '"></th>';
	}

	var rows = "";
	for (var i = 0; i < sorted.length; i++) {
		var p = sorted[i];
		var rankCls = i==0 ? "g" : i==1 ? "s" : i==2 ? "b" : "";
		var tdKits = "";
		for (var j = 0; j < kits.length; j++) {
			var t = (p.tiers || {})[kits[j]] || "UR";
			tdKits += '<td><span class="mini-pill ' + tierClass(t) + '">' + t + '</span></td>';
		}
		rows += '<tr onclick="openPlayer(\'' + p.name + '\')">'
			+ '<td class="rank-cell ' + rankCls + '">' + (i+1) + '</td>'
			+ '<td><div class="pl-cell">'
			+ '<img src="' + getHeadUrl(p) + '" alt="" onerror="this.style.opacity=\'0\'">'
			+ '<span class="pl-name">' + p.name + '</span>'
			+ '<span class="reg-tag">' + (p.region || "GE") + '</span>'
			+ '</div></td>'
			+ '<td class="pts-cell">' + p.prestige + '</td>'
			+ tdKits
			+ '</tr>';
	}

	b.innerHTML = '<div class="ov-wrap"><div class="ov-table-box"><table>'
		+ '<thead><tr><th>#</th><th>Player</th><th>Pts</th>' + thKits + '</tr></thead>'
		+ '<tbody>' + rows + '</tbody>'
		+ '</table></div></div>';
}

function renderKitMode(b, kit) {
	b.innerHTML = "";

	for (var n = 1; n <= 5; n++) {
		var htPlayers = players.filter(function(p){ return (p.tiers||{})[kit] == "HT"+n; }).sort(function(a,x){ return x.prestige-a.prestige; });
		var ltPlayers = players.filter(function(p){ return (p.tiers||{})[kit] == "LT"+n; }).sort(function(a,x){ return x.prestige-a.prestige; });
		var all = htPlayers.concat(ltPlayers);

		var col = document.createElement("div");
		col.className = "col";

		var cardHtml = "";
		if (all.length == 0) {
			cardHtml = '<div class="empty-col">no players</div>';
		} else {
			for (var i = 0; i < all.length; i++) {
				var p = all[i];
				var t = (p.tiers||{})[kit] || "UR";
				var rk = globalRank(p.name);
				var htBorder = t.startsWith("HT") ? "border-color:rgba(255,255,255,.12);" : "";
				cardHtml += '<div class="pc" style="' + htBorder + 'animation-delay:' + (i * 0.03) + 's" onclick="openPlayer(\'' + p.name + '\')">'
					+ '<span class="pc-num">' + rk + '</span>'
					+ '<img class="pc-img" src="' + getHeadUrl(p) + '" alt="" onerror="this.style.opacity=\'0\'">'
					+ '<div class="pc-info">'
					+ '<div class="pc-name">' + p.name + '</div>'
					+ '<div class="pc-sub">' + (p.region||"GE") + ' &middot; ' + p.prestige + 'pts</div>'
					+ '</div>'
					+ '<div class="pc-r">'
					+ '<span class="pc-tier ' + tierClass(t) + '">' + t + '</span>'
					+ '<span class="pc-arr">&rsaquo;</span>'
					+ '</div></div>';
			}
		}

		col.innerHTML = '<div class="col-hd">'
			+ '<div class="col-title"><span class="ht' + n + '">HT' + n + '</span><span class="lt' + n + '" style="opacity:.55"> / LT' + n + '</span></div>'
			+ '<div class="col-ct">' + all.length + '</div>'
			+ '</div>'
			+ '<div class="col-body">' + cardHtml + '</div>';

		b.appendChild(col);
	}
}

function renderCommunity(b) {
	b.innerHTML = '<div class="info-pg">'
		+ '<div><div class="pg-eyebrow">Community</div><div class="pg-heading">Join<br>Discord</div></div>'
		+ '<a href="https://discord.gg/y4j7GGSBs" target="_blank" class="disc-btn">'
		+ '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.74 19.74 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>'
		+ 'Join Discord</a></div>';
}

function renderStaff(b) {
	b.innerHTML = '<div class="info-pg">'
		+ '<div><div class="pg-eyebrow">Team</div><div class="pg-heading">Staff</div></div>'
		+ '<div class="staff-list">'
		+ '<div class="staff-card"><div class="staff-role">Owner</div><div class="staff-name">androvame</div></div>'
		+ '<div class="staff-card"><div class="staff-role">Owner</div><div class="staff-name">jer aravin :D</div></div>'
		+ '</div></div>';
}

function openPlayer(name) {
	var p = null;
	for (var i = 0; i < players.length; i++) {
		if (players[i].name == name) { p = players[i]; break; }
	}
	if (!p) return;

	var rk = globalRank(name);

	var chips = "";
	for (var i = 0; i < kits.length; i++) {
		var k = kits[i];
		var t = (p.tiers||{})[k] || "UR";
		var bc = (t.startsWith("HT") || t.startsWith("LT")) ? "border-color:rgba(255,255,255,.13);" : "";
		chips += '<div class="m-kit" style="' + bc + '">'
			+ '<img src="' + icons[k] + '" alt="" onerror="this.style.opacity=\'.15\'">'
			+ '<div class="m-kit-name">' + (kitShort[k] || k) + '</div>'
			+ '<div class="m-kit-tier ' + tierClass(t) + '">' + t + '</div>'
			+ '</div>';
	}

	document.getElementById("mContent").innerHTML =
		'<div class="mbox-top">'
		+ '<img class="m-avatar" src="' + getBodyUrl(p) + '" alt="" onerror="this.style.opacity=\'0\'">'
		+ '<div>'
		+ '<div class="m-name">' + p.name + '</div>'
		+ '<div class="m-meta">'
		+ '<span class="m-reg">' + (p.region||"GE") + '</span>'
		+ '<span class="m-rank">#' + rk + ' overall</span>'
		+ '<span class="m-pts">' + p.prestige + ' pts</span>'
		+ '</div></div></div>'
		+ '<div class="m-kits">' + chips + '</div>';

	document.getElementById("modal").classList.add("open");
}

function closeModal() {
	document.getElementById("modal").classList.remove("open");
}

function getMatches(q) {
	if (!q.trim()) return [];
	var lq = q.toLowerCase();
	var res = players.filter(function(p){ return p.name.toLowerCase().indexOf(lq) != -1; });
	res.sort(function(a, b) {
		var as = a.name.toLowerCase().indexOf(lq) == 0 ? 0 : 1;
		var bs = b.name.toLowerCase().indexOf(lq) == 0 ? 0 : 1;
		if (as != bs) return as - bs;
		return b.prestige - a.prestige;
	});
	return res.slice(0, 6);
}

function showSuggs() {
	var q = document.getElementById("searchInput").value;
	var box = document.getElementById("suggs");
	var matches = getMatches(q);

	if (!matches.length) {
		box.classList.remove("show");
		return;
	}

	var html = "";
	for (var i = 0; i < matches.length; i++) {
		var p = matches[i];
		html += '<div class="sugg' + (i == sugFocus ? " on" : "") + '" data-name="' + p.name + '">'
			+ '<img src="' + getHeadUrl(p) + '" alt="" onerror="this.style.opacity=\'0\'">'
			+ '<span class="sugg-name">' + p.name + '</span>'
			+ '<span class="sugg-pts">' + p.prestige + 'pts</span>'
			+ '</div>';
	}

	box.innerHTML = html;
	box.classList.add("show");

	box.querySelectorAll(".sugg").forEach(function(el) {
		el.addEventListener("click", function() {
			document.getElementById("searchInput").value = el.dataset.name;
			hideSuggs();
			openPlayer(el.dataset.name);
		});
	});
}

function hideSuggs() {
	document.getElementById("suggs").classList.remove("show");
	sugFocus = -1;
}

function doSearch() {
	var q = document.getElementById("searchInput").value.trim().toLowerCase();
	if (!q) return;
	var found = null;
	for (var i = 0; i < players.length; i++) {
		if (players[i].name.toLowerCase() == q) { found = players[i]; break; }
	}
	if (!found) {
		for (var i = 0; i < players.length; i++) {
			if (players[i].name.toLowerCase().indexOf(q) != -1) { found = players[i]; break; }
		}
	}
	hideSuggs();
	if (found) openPlayer(found.name);
}

document.getElementById("searchInput").addEventListener("input", function() {
	sugFocus = -1;
	showSuggs();
});

document.getElementById("searchInput").addEventListener("keydown", function(e) {
	var matches = getMatches(this.value);
	if (e.key == "ArrowDown") {
		e.preventDefault();
		sugFocus = Math.min(sugFocus + 1, matches.length - 1);
		showSuggs();
	} else if (e.key == "ArrowUp") {
		e.preventDefault();
		sugFocus = Math.max(sugFocus - 1, 0);
		showSuggs();
	} else if (e.key == "Enter") {
		if (sugFocus >= 0 && matches[sugFocus]) {
			this.value = matches[sugFocus].name;
			hideSuggs();
			openPlayer(matches[sugFocus].name);
		} else {
			doSearch();
		}
	} else if (e.key == "Escape") {
		hideSuggs();
	}
});

document.addEventListener("click", function(e) {
	if (!document.querySelector(".search-wrap").contains(e.target)) hideSuggs();
});

document.getElementById("modal").addEventListener("click", function(e) {
	if (e.target == this) closeModal();
});

document.addEventListener("keydown", function(e) {
	if (e.key == "Escape") closeModal();
});

loadData();
setInterval(loadData, 30000);

</script>
