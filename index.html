<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoTierss</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
	background: #09090b;
	color: #fafafa;
	font-family: 'Syne', sans-serif;
	min-height: 100vh;
	overflow-x: hidden;
	-webkit-font-smoothing: antialiased;
}

::selection { background: #7c3aed; color: #fff; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #27272a; border-radius: 99px; }

/* subtle noise texture overlay */
body::before {
	content: '';
	position: fixed;
	inset: 0;
	background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
	opacity: 0.025;
	pointer-events: none;
	z-index: 1000;
}

/* glow behind header */
body::after {
	content: '';
	position: fixed;
	top: -120px;
	left: 50%;
	transform: translateX(-50%);
	width: 600px;
	height: 300px;
	background: radial-gradient(ellipse, rgba(124,58,237,0.12) 0%, transparent 70%);
	pointer-events: none;
	z-index: 0;
}

/* HEADER */

header {
	position: sticky;
	top: 0;
	z-index: 50;
	height: 60px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 0 20px;
	background: rgba(9,9,11,0.85);
	border-bottom: 1px solid rgba(255,255,255,0.06);
	backdrop-filter: blur(16px);
	-webkit-backdrop-filter: blur(16px);
	animation: slideDown 0.5s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes slideDown {
	from { transform: translateY(-100%); opacity: 0; }
	to   { transform: translateY(0);    opacity: 1; }
}

.logo {
	display: flex;
	align-items: center;
	gap: 9px;
	text-decoration: none;
	color: inherit;
}

.logo-crown {
	width: 28px;
	height: 28px;
	flex-shrink: 0;
	filter: drop-shadow(0 0 8px rgba(250,204,21,0.5));
	animation: crownFloat 4s ease-in-out infinite;
}

@keyframes crownFloat {
	0%, 100% { transform: translateY(0);   filter: drop-shadow(0 0 8px rgba(250,204,21,0.5)); }
	50%       { transform: translateY(-2px); filter: drop-shadow(0 0 14px rgba(250,204,21,0.8)); }
}

.logo-text {
	font-size: 1.15rem;
	font-weight: 800;
	letter-spacing: -0.03em;
	line-height: 1;
}

.logo-text em {
	font-style: normal;
	color: #7c3aed;
}

.logo-by {
	font-family: 'DM Mono', monospace;
	font-size: 0.55rem;
	color: #3f3f46;
	letter-spacing: 0.06em;
	display: block;
	margin-top: 3px;
}

.hdr-right {
	display: flex;
	align-items: center;
	gap: 8px;
}

.search-wrap { position: relative; }

#searchInput {
	width: 200px;
	background: rgba(255,255,255,0.04);
	border: 1px solid rgba(255,255,255,0.08);
	border-radius: 8px;
	color: #fafafa;
	font-family: 'Syne', sans-serif;
	font-size: 0.82rem;
	font-weight: 500;
	padding: 7px 12px;
	outline: none;
	transition: border-color 0.2s, box-shadow 0.2s, width 0.25s;
}

#searchInput::placeholder { color: #3f3f46; }

#searchInput:focus {
	border-color: #7c3aed;
	box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
	width: 240px;
}

#suggs {
	position: absolute;
	top: calc(100% + 6px);
	left: 0;
	width: 100%;
	background: #111113;
	border: 1px solid rgba(255,255,255,0.1);
	border-radius: 10px;
	overflow: hidden;
	display: none;
	z-index: 300;
	box-shadow: 0 20px 50px rgba(0,0,0,0.7);
}

#suggs.show {
	display: block;
	animation: suggIn 0.12s ease both;
}

@keyframes suggIn {
	from { opacity: 0; transform: translateY(-4px); }
	to   { opacity: 1; transform: translateY(0); }
}

.sugg {
	display: flex;
	align-items: center;
	gap: 9px;
	padding: 8px 12px;
	cursor: pointer;
	transition: background 0.1s;
	border-bottom: 1px solid rgba(255,255,255,0.04);
}

.sugg:last-child { border-bottom: none; }
.sugg:hover, .sugg.on { background: rgba(255,255,255,0.05); }

.sugg img {
	width: 26px;
	height: 26px;
	image-rendering: pixelated;
	border-radius: 4px;
}

.sugg-name { flex: 1; font-weight: 600; font-size: 0.84rem; }
.sugg-pts  { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: #52525b; }

.btn-go {
	background: #7c3aed;
	border: none;
	border-radius: 8px;
	color: #fff;
	font-family: 'Syne', sans-serif;
	font-weight: 700;
	font-size: 0.82rem;
	padding: 7px 16px;
	cursor: pointer;
	transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
	letter-spacing: 0.01em;
}

.btn-go:hover { background: #6d28d9; box-shadow: 0 0 20px rgba(124,58,237,0.35); }
.btn-go:active { transform: scale(0.97); }

#plcount {
	font-family: 'DM Mono', monospace;
	font-size: 0.65rem;
	color: #3f3f46;
	background: rgba(255,255,255,0.03);
	border: 1px solid rgba(255,255,255,0.06);
	border-radius: 99px;
	padding: 4px 10px;
	letter-spacing: 0.04em;
}

/* NAV */

nav {
	position: relative;
	z-index: 10;
	background: rgba(9,9,11,0.7);
	border-bottom: 1px solid rgba(255,255,255,0.06);
	display: flex;
	overflow-x: auto;
	scrollbar-width: none;
	padding: 0 16px;
	backdrop-filter: blur(10px);
	animation: slideDown 0.5s 0.05s cubic-bezier(0.16,1,0.3,1) both;
}

nav::-webkit-scrollbar { display: none; }

.tab {
	display: flex;
	align-items: center;
	gap: 6px;
	padding: 11px 14px;
	font-family: 'Syne', sans-serif;
	font-weight: 600;
	font-size: 0.78rem;
	color: #52525b;
	background: none;
	border: none;
	border-bottom: 2px solid transparent;
	cursor: pointer;
	white-space: nowrap;
	transition: color 0.18s, border-color 0.18s;
	position: relative;
	top: 1px;
	letter-spacing: 0.01em;
}

.tab:hover { color: #a1a1aa; }

.tab.active {
	color: #fafafa;
	border-bottom-color: #7c3aed;
}

.tab img {
	width: 13px;
	height: 13px;
	opacity: 0.4;
	transition: opacity 0.18s;
}

.tab:hover img, .tab.active img { opacity: 1; }

/* active tab glow dot */
.tab.active::after {
	content: '';
	position: absolute;
	bottom: -1px;
	left: 50%;
	transform: translateX(-50%);
	width: 30px;
	height: 2px;
	background: #7c3aed;
	border-radius: 99px;
	box-shadow: 0 0 10px rgba(124,58,237,0.8);
}

/* BOARD */

#board {
	position: relative;
	z-index: 5;
	padding: 20px;
	display: flex;
	gap: 12px;
	overflow-x: auto;
	min-height: calc(100vh - 116px);
}

#board.anim {
	animation: boardIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes boardIn {
	from { opacity: 0; transform: translateY(16px); }
	to   { opacity: 1; transform: translateY(0); }
}

/* COLUMNS */

.col {
	flex: 1;
	min-width: 250px;
	background: rgba(255,255,255,0.025);
	border: 1px solid rgba(255,255,255,0.07);
	border-radius: 12px;
	overflow: hidden;
	display: flex;
	flex-direction: column;
	transition: border-color 0.2s;
}

.col:hover { border-color: rgba(255,255,255,0.1); }

.col-hd {
	padding: 13px 16px 10px;
	border-bottom: 1px solid rgba(255,255,255,0.06);
	display: flex;
	align-items: center;
	justify-content: space-between;
}

.col-title {
	font-weight: 800;
	font-size: 0.8rem;
	letter-spacing: 0.08em;
	text-transform: uppercase;
}

.col-ct {
	font-family: 'DM Mono', monospace;
	font-size: 0.6rem;
	color: #3f3f46;
	background: rgba(255,255,255,0.04);
	border: 1px solid rgba(255,255,255,0.06);
	border-radius: 99px;
	padding: 2px 8px;
}

.col-body { flex: 1; overflow-y: auto; }

/* PLAYER CARD */

.pc {
	display: flex;
	align-items: center;
	gap: 9px;
	padding: 9px 14px;
	border-bottom: 1px solid rgba(255,255,255,0.04);
	cursor: pointer;
	transition: background 0.12s;
	position: relative;
	overflow: hidden;
}

.pc::before {
	content: '';
	position: absolute;
	left: 0;
	top: 0;
	bottom: 0;
	width: 2px;
	background: transparent;
	transition: background 0.2s;
}

.pc:hover::before { background: #7c3aed; }

.pc:last-child { border-bottom: none; }
.pc:hover { background: rgba(255,255,255,0.04); }
.pc:hover .pc-arr { opacity: 1; transform: translateX(0); }
.pc:hover .pc-img { transform: scale(1.08); }

.pc-num {
	font-family: 'DM Mono', monospace;
	font-size: 0.6rem;
	color: #3f3f46;
	min-width: 18px;
	text-align: right;
	flex-shrink: 0;
}

.pc-img {
	width: 34px;
	height: 34px;
	image-rendering: pixelated;
	border-radius: 6px;
	background: rgba(255,255,255,0.05);
	flex-shrink: 0;
	transition: transform 0.18s;
}

.pc-info { flex: 1; min-width: 0; }

.pc-name {
	font-weight: 700;
	font-size: 0.88rem;
	letter-spacing: -0.01em;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}

.pc-sub {
	font-family: 'DM Mono', monospace;
	font-size: 0.56rem;
	color: #3f3f46;
	margin-top: 2px;
	letter-spacing: 0.04em;
}

.pc-r {
	display: flex;
	align-items: center;
	gap: 6px;
	flex-shrink: 0;
}

.pc-tier {
	font-family: 'DM Mono', monospace;
	font-weight: 500;
	font-size: 0.75rem;
	letter-spacing: 0.04em;
}

.pc-arr {
	font-size: 0.65rem;
	color: #3f3f46;
	opacity: 0;
	transform: translateX(-3px);
	transition: opacity 0.15s, transform 0.15s;
}

.reg {
	font-family: 'DM Mono', monospace;
	font-size: 0.5rem;
	color: #3f3f46;
	border: 1px solid rgba(255,255,255,0.07);
	border-radius: 3px;
	padding: 1px 4px;
}

.empty-col {
	padding: 40px 16px;
	text-align: center;
	font-family: 'DM Mono', monospace;
	font-size: 0.65rem;
	color: #27272a;
	letter-spacing: 0.08em;
}

/* card stagger anim */
.pc { animation: cardIn 0.25s ease both; }
@keyframes cardIn {
	from { opacity: 0; transform: translateX(-6px); }
	to   { opacity: 1; transform: translateX(0); }
}

/* OVERALL TABLE */

.ov-wrap { width: 100%; }

.ov-box {
	background: rgba(255,255,255,0.025);
	border: 1px solid rgba(255,255,255,0.07);
	border-radius: 12px;
	overflow: hidden;
	width: 100%;
}

.ov-box table { width: 100%; border-collapse: collapse; }

.ov-box thead tr { border-bottom: 1px solid rgba(255,255,255,0.07); }

.ov-box thead th {
	font-family: 'DM Mono', monospace;
	font-size: 0.58rem;
	font-weight: 500;
	color: #3f3f46;
	letter-spacing: 0.1em;
	text-transform: uppercase;
	padding: 10px 14px;
	text-align: left;
}

.ov-box tbody tr {
	border-bottom: 1px solid rgba(255,255,255,0.04);
	cursor: pointer;
	transition: background 0.12s;
	animation: rowIn 0.25s ease both;
}

@keyframes rowIn {
	from { opacity: 0; }
	to   { opacity: 1; }
}

.ov-box tbody tr:last-child { border-bottom: none; }
.ov-box tbody tr:hover { background: rgba(255,255,255,0.04); }
.ov-box tbody td { padding: 8px 14px; vertical-align: middle; }

.rk {
	font-family: 'DM Mono', monospace;
	font-size: 0.7rem;
	font-weight: 500;
	color: #3f3f46;
	width: 36px;
}
.rk.gold   { color: #fbbf24; }
.rk.silver { color: #94a3b8; }
.rk.bronze { color: #b45309; }

.pl-wrap { display: flex; align-items: center; gap: 9px; }
.pl-wrap img { width: 28px; height: 28px; image-rendering: pixelated; border-radius: 4px; }
.pl-n { font-weight: 700; font-size: 0.86rem; letter-spacing: -0.01em; }

.pts {
	font-family: 'DM Mono', monospace;
	font-size: 0.72rem;
	font-weight: 500;
	color: #7c3aed;
}

.pill {
	font-family: 'DM Mono', monospace;
	font-size: 0.56rem;
	font-weight: 500;
	padding: 2px 5px;
	border-radius: 4px;
	background: rgba(255,255,255,0.04);
	border: 1px solid rgba(255,255,255,0.06);
	letter-spacing: 0.03em;
}

/* MODAL */

#modal {
	position: fixed;
	inset: 0;
	background: rgba(0,0,0,0.75);
	backdrop-filter: blur(8px);
	-webkit-backdrop-filter: blur(8px);
	z-index: 500;
	display: flex;
	align-items: center;
	justify-content: center;
	opacity: 0;
	pointer-events: none;
	transition: opacity 0.2s;
}

#modal.open {
	opacity: 1;
	pointer-events: auto;
}

.mbox {
	background: #0f0f12;
	border: 1px solid rgba(255,255,255,0.1);
	border-radius: 16px;
	width: 100%;
	max-width: 440px;
	margin: 20px;
	position: relative;
	box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
}

#modal.open .mbox {
	animation: mIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes mIn {
	from { opacity: 0; transform: scale(0.92) translateY(12px); }
	to   { opacity: 1; transform: scale(1)    translateY(0); }
}

/* top accent line on modal */
.mbox::before {
	content: '';
	position: absolute;
	top: 0;
	left: 20%;
	right: 20%;
	height: 1px;
	background: linear-gradient(90deg, transparent, rgba(124,58,237,0.6), transparent);
	border-radius: 99px;
}

.mbox-top {
	display: flex;
	gap: 15px;
	align-items: center;
	padding: 20px 20px 16px;
	border-bottom: 1px solid rgba(255,255,255,0.06);
}

.m-av {
	width: 62px;
	height: 62px;
	image-rendering: pixelated;
	border-radius: 10px;
	background: rgba(255,255,255,0.05);
	flex-shrink: 0;
	object-fit: cover;
	border: 1px solid rgba(255,255,255,0.1);
}

.m-name {
	font-weight: 800;
	font-size: 1.4rem;
	letter-spacing: -0.02em;
	line-height: 1.1;
}

.m-meta {
	display: flex;
	align-items: center;
	gap: 6px;
	margin-top: 7px;
	flex-wrap: wrap;
}

.m-reg {
	font-family: 'DM Mono', monospace;
	font-size: 0.58rem;
	color: #52525b;
	border: 1px solid rgba(255,255,255,0.07);
	border-radius: 4px;
	padding: 2px 6px;
}

.m-rank {
	font-family: 'DM Mono', monospace;
	font-size: 0.62rem;
	font-weight: 500;
	color: #a78bfa;
	background: rgba(124,58,237,0.12);
	border: 1px solid rgba(124,58,237,0.2);
	border-radius: 4px;
	padding: 2px 7px;
}

.m-pts {
	font-family: 'DM Mono', monospace;
	font-size: 0.62rem;
	color: #52525b;
}

.m-close {
	position: absolute;
	top: 12px;
	right: 12px;
	background: rgba(255,255,255,0.05);
	border: 1px solid rgba(255,255,255,0.08);
	color: #52525b;
	width: 26px;
	height: 26px;
	border-radius: 6px;
	cursor: pointer;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 0.8rem;
	transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.m-close:hover {
	background: rgba(239,68,68,0.12);
	color: #ef4444;
	border-color: rgba(239,68,68,0.25);
}

.m-kits {
	display: grid;
	grid-template-columns: repeat(4, 1fr);
	gap: 6px;
	padding: 15px 18px 18px;
}

.m-kit {
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: 4px;
	background: rgba(255,255,255,0.03);
	border: 1px solid rgba(255,255,255,0.06);
	border-radius: 10px;
	padding: 10px 5px 8px;
	transition: border-color 0.2s, transform 0.18s, background 0.2s;
	cursor: default;
}

.m-kit:hover {
	background: rgba(255,255,255,0.06);
	transform: translateY(-2px);
}

.m-kit img { width: 18px; height: 18px; opacity: 0.65; }

.m-kit-n {
	font-family: 'DM Mono', monospace;
	font-size: 0.48rem;
	color: #3f3f46;
	letter-spacing: 0.06em;
	text-transform: uppercase;
	text-align: center;
}

.m-kit-t {
	font-family: 'DM Mono', monospace;
	font-weight: 500;
	font-size: 0.82rem;
	letter-spacing: 0.04em;
}

/* INFO PAGES */

.info-pg {
	display: flex;
	flex-direction: column;
	padding: 40px 28px;
	gap: 28px;
	width: 100%;
}

.pg-label {
	font-family: 'DM Mono', monospace;
	font-size: 0.6rem;
	color: #3f3f46;
	letter-spacing: 0.2em;
	text-transform: uppercase;
	margin-bottom: 10px;
}

.pg-title {
	font-size: clamp(2rem, 5vw, 3.8rem);
	font-weight: 800;
	letter-spacing: -0.04em;
	line-height: 0.95;
}

.disc-btn {
	display: inline-flex;
	align-items: center;
	gap: 10px;
	background: #5865f2;
	color: #fff;
	font-family: 'Syne', sans-serif;
	font-weight: 700;
	font-size: 0.9rem;
	padding: 12px 22px;
	border-radius: 10px;
	text-decoration: none;
	width: fit-content;
	transition: opacity 0.18s, transform 0.12s, box-shadow 0.2s;
	letter-spacing: 0.01em;
}

.disc-btn:hover {
	opacity: 0.9;
	transform: translateY(-1px);
	box-shadow: 0 8px 25px rgba(88,101,242,0.35);
}

.disc-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

.staff-row { display: flex; flex-wrap: wrap; gap: 10px; }

.staff-card {
	background: rgba(255,255,255,0.03);
	border: 1px solid rgba(255,255,255,0.07);
	border-radius: 10px;
	padding: 16px 22px;
	transition: border-color 0.18s, transform 0.18s, background 0.18s;
}

.staff-card:hover {
	border-color: rgba(124,58,237,0.3);
	background: rgba(124,58,237,0.05);
	transform: translateY(-2px);
}

.staff-role {
	font-family: 'DM Mono', monospace;
	font-size: 0.55rem;
	color: #7c3aed;
	letter-spacing: 0.15em;
	text-transform: uppercase;
	font-weight: 500;
	margin-bottom: 5px;
}

.staff-name { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.02em; }

/* TIER COLORS */

.ht1 { color: #e879f9; }
.ht2 { color: #38bdf8; }
.ht3 { color: #fde047; }
.ht4 { color: #d4d4d8; }
.ht5 { color: #a1a1aa; }
.lt1 { color: #38bdf8; }
.lt2 { color: #fde047; }
.lt3 { color: #d4d4d8; }
.lt4 { color: #71717a; }
.lt5 { color: #52525b; }
.ur  { color: #27272a; }

/* LOADER */

.loader {
	display: flex;
	align-items: center;
	justify-content: center;
	width: 100%;
	gap: 8px;
	font-family: 'DM Mono', monospace;
	font-size: 0.7rem;
	color: #3f3f46;
	letter-spacing: 0.06em;
}

.spin {
	width: 14px;
	height: 14px;
	border: 2px solid rgba(255,255,255,0.07);
	border-top-color: #7c3aed;
	border-radius: 50%;
	animation: spin 0.65s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
	header { padding: 0 14px; }
	#plcount { display: none; }
	.m-kits { grid-template-columns: repeat(3, 1fr); }
	#board { padding: 12px; }
	#searchInput { width: 160px; }
}

</style>
</head>
<body>

<header>
	<div class="logo">
		<!-- crown SVG -->
		<svg class="logo-crown" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
			<path d="M3 17L5 9L9 13L12 7L15 13L19 9L21 17H3Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" stroke-linejoin="round"/>
			<rect x="3" y="17" width="18" height="2.5" rx="1" fill="#f59e0b"/>
			<circle cx="12" cy="7" r="1.5" fill="#fde047"/>
			<circle cx="5" cy="9" r="1.2" fill="#fde047"/>
			<circle cx="19" cy="9" r="1.2" fill="#fde047"/>
		</svg>
		<div>
			<div class="logo-text">Geo<em>Tierss</em></div>
			<span class="logo-by">by androvame</span>
		</div>
	</div>

	<div class="hdr-right">
		<div class="search-wrap">
			<input id="searchInput" type="text" placeholder="Search player..." autocomplete="off">
			<div id="suggs"></div>
		</div>
		<button class="btn-go" onclick="doSearch()">Search</button>
		<div id="plcount">0 players</div>
	</div>
</header>

<nav id="tabs"></nav>

<div id="board" class="anim">
	<div class="loader"><div class="spin"></div>loading...</div>
</div>

<div id="modal">
	<div class="mbox">
		<button class="m-close" onclick="closeModal()">&#x2715;</button>
		<div id="mContent"></div>
	</div>
</div>

<script>

var kits  = ["Sword","Vanilla","UHC","Pot","NetherOP","SMP","Axe","Mace"];
var modes = ["Overall","Sword","Vanilla","UHC","Pot","NetherOP","SMP","Axe","Mace","Community","Staff"];

var icons = {
	Overall:  "https://mctiers.com/tier_icons/overall.svg",
	Sword:    "https://mctiers.com/tier_icons/sword.svg",
	Vanilla:  "https://mctiers.com/tier_icons/vanilla.svg",
	UHC:      "https://mctiers.com/tier_icons/uhc.svg",
	Pot:      "https://mctiers.com/tier_icons/pot.svg",
	NetherOP: "https://mctiers.com/tier_icons/nethop.svg",
	SMP:      "https://mctiers.com/tier_icons/smp.svg",
	Axe:      "https://mctiers.com/tier_icons/axe.svg",
	Mace:     "https://mctiers.com/tier_icons/mace.svg"
};

var tierPts = { HT1:25, HT2:15, HT3:10, HT4:6, HT5:2, LT1:20, LT2:12, LT3:8, LT4:4, LT5:1, UR:0 };
var kitShort = { Sword:"SWD", Vanilla:"VAN", UHC:"UHC", Pot:"POT", NetherOP:"NOP", SMP:"SMP", Axe:"AXE", Mace:"MCE" };

var players = [];
var curMode = "Overall";
var sugFocus = -1;

function calcPts(p) {
	var t = 0;
	for (var i = 0; i < kits.length; i++) t += tierPts[(p.tiers||{})[kits[i]]] || 0;
	return t;
}

function tc(t) {
	if (!t || t == "UR") return "ur";
	return t.toLowerCase();
}

function headUrl(p) {
	if (p.skinUrl) return p.skinUrl;
	return "https://tabavatars.net/avatar/?username=" + encodeURIComponent(p.name) + "&type=helm&size=36";
}

function faceUrl(p) {
	if (p.skinUrl) return p.skinUrl;
	return "https://tabavatars.net/avatar/?username=" + encodeURIComponent(p.name) + "&type=helm&size=100";
}

function grank(name) {
	var s = players.slice().sort(function(a,b){ return b.prestige - a.prestige; });
	for (var i = 0; i < s.length; i++) if (s[i].name == name) return i + 1;
	return "-";
}

function loadData() {
	fetch("./players.json?t=" + Date.now())
		.then(function(r) { return r.json(); })
		.then(function(raw) {
			players = raw.map(function(p) { p.prestige = calcPts(p); return p; });
			document.getElementById("plcount").textContent = players.length + " players";
			buildTabs();
			renderBoard();
		})
		.catch(function() {
			document.getElementById("board").innerHTML = '<div class="loader" style="color:#ef4444">couldnt load players.json</div>';
		});
}

function buildTabs() {
	var h = "";
	for (var i = 0; i < modes.length; i++) {
		var m = modes[i];
		var cls = m == curMode ? " active" : "";
		var ico = icons[m]
			? '<img src="' + icons[m] + '" alt="">'
			: (m == "Community" ? "&#x1F465;" : "&#x1F451;");
		h += '<button class="tab' + cls + '" onclick="go(\'' + m + '\')">' + ico + m + '</button>';
	}
	document.getElementById("tabs").innerHTML = h;
}

function go(m) {
	curMode = m;
	buildTabs();
	var b = document.getElementById("board");
	b.classList.remove("anim");
	b.offsetHeight;
	b.classList.add("anim");
	renderBoard();
}

function renderBoard() {
	var b = document.getElementById("board");
	if (curMode == "Community") { community(b); return; }
	if (curMode == "Staff")     { staff(b);     return; }
	if (curMode == "Overall")   { overall(b);   return; }
	kitMode(b, curMode);
}

function overall(b) {
	var s = players.slice().sort(function(a,x){ return x.prestige - a.prestige; });

	var th = "";
	for (var i = 0; i < kits.length; i++) {
		th += '<th><img src="' + icons[kits[i]] + '" style="width:12px;height:12px;vertical-align:middle;opacity:.45" title="' + kits[i] + '"></th>';
	}

	var rows = "";
	for (var i = 0; i < s.length; i++) {
		var p = s[i];
		var rc = i == 0 ? "gold" : i == 1 ? "silver" : i == 2 ? "bronze" : "";
		var tds = "";
		for (var j = 0; j < kits.length; j++) {
			var t = (p.tiers||{})[kits[j]] || "UR";
			tds += '<td><span class="pill ' + tc(t) + '">' + t + '</span></td>';
		}
		rows += '<tr onclick="openPlayer(\'' + p.name + '\')" style="animation-delay:' + (i * 0.02) + 's">'
			+ '<td class="rk ' + rc + '">' + (i+1) + '</td>'
			+ '<td><div class="pl-wrap">'
			+ '<img src="' + headUrl(p) + '" alt="" onerror="this.style.opacity=\'0\'">'
			+ '<span class="pl-n">' + p.name + '</span>'
			+ '<span class="reg">' + (p.region||"GE") + '</span>'
			+ '</div></td>'
			+ '<td class="pts">' + p.prestige + '</td>'
			+ tds + '</tr>';
	}

	b.innerHTML = '<div class="ov-wrap"><div class="ov-box"><table>'
		+ '<thead><tr><th>#</th><th>Player</th><th>Pts</th>' + th + '</tr></thead>'
		+ '<tbody>' + rows + '</tbody>'
		+ '</table></div></div>';
}

function kitMode(b, kit) {
	b.innerHTML = "";

	for (var n = 1; n <= 5; n++) {
		var ht = players.filter(function(p){ return (p.tiers||{})[kit] == "HT"+n; }).sort(function(a,x){ return x.prestige - a.prestige; });
		var lt = players.filter(function(p){ return (p.tiers||{})[kit] == "LT"+n; }).sort(function(a,x){ return x.prestige - a.prestige; });
		var all = ht.concat(lt);

		var col = document.createElement("div");
		col.className = "col";

		var cards = "";
		if (all.length == 0) {
			cards = '<div class="empty-col">no players</div>';
		} else {
			for (var i = 0; i < all.length; i++) {
				var p = all[i];
				var t = (p.tiers||{})[kit] || "UR";
				var rk = grank(p.name);
				var lborder = t.startsWith("HT") ? "border-left-color:#7c3aed;" : "";
				cards += '<div class="pc" style="' + lborder + 'animation-delay:' + (i*0.03) + 's" onclick="openPlayer(\'' + p.name + '\')">'
					+ '<span class="pc-num">' + rk + '</span>'
					+ '<img class="pc-img" src="' + headUrl(p) + '" alt="" onerror="this.style.opacity=\'0\'">'
					+ '<div class="pc-info">'
					+ '<div class="pc-name">' + p.name + '</div>'
					+ '<div class="pc-sub">' + (p.region||"GE") + ' &middot; ' + p.prestige + 'pts</div>'
					+ '</div>'
					+ '<div class="pc-r">'
					+ '<span class="pc-tier ' + tc(t) + '">' + t + '</span>'
					+ '<span class="pc-arr">›</span>'
					+ '</div></div>';
			}
		}

		col.innerHTML = '<div class="col-hd">'
			+ '<div class="col-title"><span class="ht' + n + '">HT' + n + '</span><span class="lt' + n + '" style="opacity:.5"> / LT' + n + '</span></div>'
			+ '<div class="col-ct">' + all.length + '</div>'
			+ '</div><div class="col-body">' + cards + '</div>';

		b.appendChild(col);
	}
}

function community(b) {
	b.innerHTML = '<div class="info-pg">'
		+ '<div><div class="pg-label">Community</div><div class="pg-title">Join<br>Discord</div></div>'
		+ '<a href="https://discord.gg/aRgCcTqAxB" target="_blank" class="disc-btn">'
		+ '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.74 19.74 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>'
		+ 'Join Discord</a></div>';
}

function staff(b) {
	b.innerHTML = '<div class="info-pg">'
		+ '<div><div class="pg-label">Team</div><div class="pg-title">Staff</div></div>'
		+ '<div class="staff-row">'
		+ '<div class="staff-card"><div class="staff-role">Owner</div><div class="staff-name">androvame</div></div>'
		+ '</div></div>';
}

function openPlayer(name) {
	var p = null;
	for (var i = 0; i < players.length; i++) if (players[i].name == name) { p = players[i]; break; }
	if (!p) return;

	var rk = grank(name);
	var chips = "";

	for (var i = 0; i < kits.length; i++) {
		var k = kits[i];
		var t = (p.tiers||{})[k] || "UR";
		var ranked = t != "UR";
		var bc = ranked ? "border-color:rgba(255,255,255,0.1);" : "";
		chips += '<div class="m-kit" style="' + bc + '">'
			+ '<img src="' + icons[k] + '" alt="" onerror="this.style.opacity=\'.1\'">'
			+ '<div class="m-kit-n">' + kitShort[k] + '</div>'
			+ '<div class="m-kit-t ' + tc(t) + '">' + t + '</div>'
			+ '</div>';
	}

	document.getElementById("mContent").innerHTML =
		'<div class="mbox-top">'
		+ '<img class="m-av" src="' + faceUrl(p) + '" alt="" onerror="this.style.opacity=\'0\'">'
		+ '<div>'
		+ '<div class="m-name">' + p.name + '</div>'
		+ '<div class="m-meta">'
		+ '<span class="m-reg">' + (p.region||"GE") + '</span>'
		+ '<span class="m-rank">#' + rk + ' overall</span>'
		+ '<span class="m-pts">' + p.prestige + ' pts</span>'
		+ '</div></div></div>'
		+ '<div class="m-kits">' + chips + '</div>';

	document.getElementById("modal").classList.add("open");
}

function closeModal() {
	document.getElementById("modal").classList.remove("open");
}

function getMatches(q) {
	if (!q.trim()) return [];
	var lq = q.toLowerCase();
	var res = players.filter(function(p){ return p.name.toLowerCase().indexOf(lq) != -1; });
	res.sort(function(a, b) {
		var as = a.name.toLowerCase().indexOf(lq) == 0 ? 0 : 1;
		var bs = b.name.toLowerCase().indexOf(lq) == 0 ? 0 : 1;
		if (as != bs) return as - bs;
		return b.prestige - a.prestige;
	});
	return res.slice(0, 6);
}

function showSuggs() {
	var q   = document.getElementById("searchInput").value;
	var box = document.getElementById("suggs");
	var m   = getMatches(q);

	if (!m.length) { box.classList.remove("show"); return; }

	var h = "";
	for (var i = 0; i < m.length; i++) {
		var p = m[i];
		h += '<div class="sugg' + (i == sugFocus ? " on" : "") + '" data-name="' + p.name + '">'
			+ '<img src="' + headUrl(p) + '" alt="" onerror="this.style.opacity=\'0\'">'
			+ '<span class="sugg-name">' + p.name + '</span>'
			+ '<span class="sugg-pts">' + p.prestige + 'pts</span>'
			+ '</div>';
	}

	box.innerHTML = h;
	box.classList.add("show");

	box.querySelectorAll(".sugg").forEach(function(el) {
		el.addEventListener("click", function() {
			document.getElementById("searchInput").value = el.dataset.name;
			hideSuggs();
			openPlayer(el.dataset.name);
		});
	});
}

function hideSuggs() {
	document.getElementById("suggs").classList.remove("show");
	sugFocus = -1;
}

function doSearch() {
	var q = document.getElementById("searchInput").value.trim().toLowerCase();
	if (!q) return;
	var found = null;
	for (var i = 0; i < players.length; i++) {
		if (players[i].name.toLowerCase() == q) { found = players[i]; break; }
	}
	if (!found) {
		for (var i = 0; i < players.length; i++) {
			if (players[i].name.toLowerCase().indexOf(q) != -1) { found = players[i]; break; }
		}
	}
	hideSuggs();
	if (found) openPlayer(found.name);
}

document.getElementById("searchInput").addEventListener("input", function() {
	sugFocus = -1;
	showSuggs();
});

document.getElementById("searchInput").addEventListener("keydown", function(e) {
	var m = getMatches(this.value);
	if (e.key == "ArrowDown") {
		e.preventDefault();
		sugFocus = Math.min(sugFocus + 1, m.length - 1);
		showSuggs();
	} else if (e.key == "ArrowUp") {
		e.preventDefault();
		sugFocus = Math.max(sugFocus - 1, 0);
		showSuggs();
	} else if (e.key == "Enter") {
		if (sugFocus >= 0 && m[sugFocus]) {
			this.value = m[sugFocus].name;
			hideSuggs();
			openPlayer(m[sugFocus].name);
		} else {
			doSearch();
		}
	} else if (e.key == "Escape") {
		hideSuggs();
	}
});

document.addEventListener("click", function(e) {
	if (!document.querySelector(".search-wrap").contains(e.target)) hideSuggs();
});

document.getElementById("modal").addEventListener("click", function(e) {
	if (e.target == this) closeModal();
});

document.addEventListener("keydown", function(e) {
	if (e.key == "Escape") closeModal();
});

loadData();
setInterval(loadData, 30000);

</script>
</body>
</html>
